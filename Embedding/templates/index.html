<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal RAG Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        header .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            background: #1a3a2a;
            color: #4ade80;
            font-weight: 500;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .message .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2563eb;
        }

        .message.assistant .avatar {
            background: #7c3aed;
        }

        .message .body {
            flex: 1;
            min-width: 0;
        }

        .message .role {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #aaa;
        }

        .message .text {
            font-size: 15px;
            line-height: 1.6;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .sources {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            background: #1e1e2e;
            border: 1px solid #333;
            color: #aaa;
        }

        .source-tag .score {
            color: #4ade80;
            margin-left: 4px;
        }

        #input-area {
            padding: 16px 24px;
            border-top: 1px solid #2a2a2a;
            background: #141414;
        }

        #input-form {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        #input-form input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        #input-form input:focus {
            border-color: #555;
        }

        #input-form input::placeholder {
            color: #555;
        }

        #input-form button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        #input-form button:hover {
            background: #1d4ed8;
        }

        #input-form button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .welcome {
            max-width: 720px;
            margin: auto;
            text-align: center;
            padding: 60px 20px;
        }

        .welcome h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 8px;
        }

        .welcome p {
            color: #777;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Multimodal RAG Chat</h1>
        <span class="badge">Gemini Embeddings + Pinecone + Sonnet</span>
    </header>

    <div id="chat-container">
        <div class="welcome">
            <h2>Ask anything about your data</h2>
            <p>Your documents are embedded in Pinecone. Ask a question and Sonnet will answer using relevant context.</p>
        </div>
    </div>

    <div id="input-area">
        <form id="input-form">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" autofocus />
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const form = document.getElementById('input-form');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let firstMessage = true;

        function addMessage(role, text, sources) {
            if (firstMessage) {
                const welcome = chatContainer.querySelector('.welcome');
                if (welcome) welcome.remove();
                firstMessage = false;
            }

            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatarText = role === 'user' ? 'U' : 'S';
            let html = `
                <div class="avatar">${avatarText}</div>
                <div class="body">
                    <div class="role">${role === 'user' ? 'You' : 'Sonnet'}</div>
                    <div class="text">${escapeHtml(text)}</div>
            `;

            if (sources && sources.length > 0) {
                html += '<div class="sources">';
                sources.forEach(s => {
                    html += `<span class="source-tag">${s.filename} (${s.type})<span class="score">${s.score}</span></span>`;
                });
                html += '</div>';
            }

            html += '</div>';
            msg.innerHTML = html;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msg;
        }

        function addTypingIndicator() {
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'typing';
            msg.innerHTML = `
                <div class="avatar">S</div>
                <div class="body">
                    <div class="role">Sonnet</div>
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';
            sendBtn.disabled = true;
            addTypingIndicator();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                removeTypingIndicator();

                if (!res.ok) {
                    const err = await res.json();
                    addMessage('assistant', `Error: ${err.error || 'Something went wrong.'}`);
                    return;
                }

                const data = await res.json();
                addMessage('assistant', data.answer, data.sources);
            } catch (err) {
                removeTypingIndicator();
                addMessage('assistant', `Network error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        });
    </script>
</body>
</html>
